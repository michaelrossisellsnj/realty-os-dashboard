<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="REALTY OS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07090f">
<title>REALTY OS — Live Office</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--border:rgba(255,255,255,0.06);
  --gold:#D4AF37;--red:#E8634A;--green:#6DC86D;--purple:#A78BFA;--blue:#60A5FA;--emerald:#34d399;--amber:#FBBF24;
  --wall:#1a1d2e;--wall-light:#252840;--desk:#1c1f30;--table:#181b2c;--chair:#161826;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:rgba(255,255,255,0.88);
  font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;
  background:rgba(7,9,15,0.98);border-bottom:1px solid var(--border);flex-shrink:0;z-index:200}
.logo-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#D4AF37,#9a7b1a);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#000;font-family:'Syne',sans-serif}
.logo-text{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em}
.logo-text span{color:#D4AF37}
.stat-pill{display:flex;align-items:center;gap:5px;padding:3px 8px;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:20px;font-size:9px;font-family:'IBM Plex Mono',monospace}
.live-badge{display:flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(52,211,153,0.1);
  border:1px solid rgba(52,211,153,0.2);border-radius:20px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--emerald)}
.live-text{font-size:9px;color:var(--emerald);font-family:'IBM Plex Mono',monospace}

/* TABS */
.tab-bar{display:flex;padding:0 4px;background:rgba(7,9,15,0.95);border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 14px;background:none;border:none;border-bottom:2px solid transparent;
  color:rgba(255,255,255,0.3);font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;
  letter-spacing:.02em;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab-btn.active{border-bottom-color:var(--gold);color:var(--gold)}

/* MAIN */
.main-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 100px)}
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex}

/* FLOOR WRAP */
.floor-wrap{flex:1;overflow:auto;background:radial-gradient(circle at 50% 50%,#0d0f1a,#080a12);
  position:relative;-webkit-overflow-scrolling:touch}

/* FLOOR PLAN */
.fp{position:relative;width:1500px;height:900px;
  background-image:radial-gradient(circle,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:28px 28px;background-position:14px 14px}
.fp::before{content:'';position:absolute;inset:0;border:3px solid var(--wall-light);pointer-events:none;z-index:1}

/* ROOMS */
.room{position:absolute;border:2px solid var(--wall);border-radius:1px}
.room-label{position:absolute;top:5px;left:50%;transform:translateX(-50%);
  font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.08em;
  white-space:nowrap;opacity:.45;text-transform:uppercase;z-index:2;pointer-events:none}
.room-badge{position:absolute;top:4px;right:4px;font-size:7px;padding:2px 5px;
  border-radius:3px;font-family:'IBM Plex Mono',monospace;pointer-events:none}
.win{position:absolute;background:linear-gradient(90deg,rgba(144,200,255,0.12),rgba(144,200,255,0.06));border-radius:1px}
.win-h{height:5px;left:20px;right:20px}
.win-v{width:5px;top:20px;bottom:20px}
.room-ambient{position:absolute;inset:0;border-radius:1px;pointer-events:none}

/* FURNITURE */
.desk-furniture{position:absolute;background:var(--desk);border:1px solid #262a42;border-radius:3px;z-index:3;pointer-events:none}
.desk-top-strip{position:absolute;top:0;left:0;right:0;height:4px;border-radius:2px 2px 0 0}
.conf-table-furniture{position:absolute;background:var(--table);border:1px solid #2a2d45;border-radius:50%;z-index:3;pointer-events:none}
.chair-furniture{position:absolute;background:var(--chair);border:1px solid #1e2236;border-radius:50%;width:12px;height:12px;z-index:2;pointer-events:none}
.plant{position:absolute;font-size:18px;z-index:4;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.couch-f{position:absolute;background:#13152a;border:1px solid #252840;border-radius:4px;z-index:3;pointer-events:none}
.cabinet-f{position:absolute;background:#151826;border:1px solid #1e2138;border-radius:2px;z-index:3;pointer-events:none}

/* ═══════════════════════════════════════════
   AGENT AVATARS — FREE FLOATING
   Each agent is absolutely positioned on the floor
   and transitions smoothly to new positions
═══════════════════════════════════════════ */
.agent-avatar{
  position:absolute;
  z-index:20;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  /* THE WALKING ANIMATION — smooth 1.5s glide */
  transition: left 1.5s cubic-bezier(0.4, 0, 0.2, 1),
              top  1.5s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.5s ease;
  transform: translate(-50%, -50%);
  -webkit-tap-highlight-color:transparent;
}
.agent-avatar:hover .agent-task-bubble{display:flex}
.agent-avatar.selected .agent-task-bubble{display:flex}

/* Emoji circle */
.agent-emoji-wrap{
  position:relative;
  width:32px;height:32px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  border:2px solid;
  transition:all 0.3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.agent-emoji-wrap.idle{
  opacity:0.5;
  filter:grayscale(0.4);
}

/* Pulse ring for active agents */
.agent-pulse{
  position:absolute;inset:-3px;
  border-radius:50%;
  border:2px solid;
  animation:agentPing 2s ease-in-out infinite;
  opacity:0;
}
@keyframes agentPing{
  0%{transform:scale(1);opacity:0.6}
  100%{transform:scale(1.8);opacity:0}
}

/* Name tag */
.agent-name-tag{
  background:rgba(7,9,15,0.9);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;
  padding:2px 7px;
  font-size:8px;
  font-family:'IBM Plex Mono',monospace;
  white-space:nowrap;
  font-weight:500;
  backdrop-filter:blur(4px);
  transition:all 0.3s;
}

/* Task bubble — shows on hover/tap */
.agent-task-bubble{
  display:none;
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%;
  transform:translateX(-50%);
  background:rgba(10,12,24,0.97);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;
  padding:8px 10px;
  width:180px;
  flex-direction:column;
  gap:4px;
  z-index:30;
  box-shadow:0 8px 24px rgba(0,0,0,0.6);
  pointer-events:none;
}
.bubble-name{font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.bubble-title{font-size:8px;color:rgba(255,255,255,0.4);margin-bottom:2px}
.bubble-task{font-size:9px;color:rgba(255,255,255,0.7);line-height:1.4}
.bubble-progress-wrap{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:2px}
.bubble-progress-fill{height:100%;border-radius:2px;transition:width 0.5s}
.bubble-thread{font-size:8px;color:rgba(255,255,255,0.3);margin-top:2px}
.bubble-location{font-size:8px;margin-top:1px}
/* Arrow pointing down */
.agent-task-bubble::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:rgba(255,255,255,0.15);
}

/* Walking dots animation */
.walking-dots{
  display:none;
  position:absolute;
  bottom:-14px;
  left:50%;
  transform:translateX(-50%);
  gap:3px;
}
.agent-avatar.walking .walking-dots{display:flex}
.walking-dot{
  width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4);
}
.walking-dot:nth-child(1){animation:walkBounce 0.6s ease-in-out infinite}
.walking-dot:nth-child(2){animation:walkBounce 0.6s ease-in-out 0.2s infinite}
.walking-dot:nth-child(3){animation:walkBounce 0.6s ease-in-out 0.4s infinite}
@keyframes walkBounce{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-3px);opacity:1}}

/* Shadow under walking agents */
.agent-shadow{
  position:absolute;
  bottom:-4px;left:50%;transform:translateX(-50%);
  width:24px;height:6px;
  background:rgba(0,0,0,0.3);
  border-radius:50%;
  filter:blur(2px);
}

/* REFRESH BAR */
.refresh-bar{padding:5px 16px;background:rgba(7,9,15,0.95);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.refresh-text{font-size:8px;color:rgba(255,255,255,0.25);font-family:'IBM Plex Mono',monospace}
.refresh-progress{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;overflow:hidden;width:100px}
.refresh-bar-fill{height:100%;background:var(--gold);border-radius:1px;transition:width 0.5s linear}

/* ACTIVITY & TASKS TABS */
.feed-wrap{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.feed-inner{max-width:780px;margin:0 auto}
.feed-item{display:flex;gap:12px;padding:10px 14px;background:rgba(255,255,255,0.025);
  border:1px solid var(--border);border-left:3px solid;border-radius:8px;margin-bottom:6px}
.board-wrap{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.board-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:1100px;margin:0 auto}
@media(max-width:700px){.board-cols{grid-template-columns:1fr 1fr}}
@media(max-width:450px){.board-cols{grid-template-columns:1fr}}
.board-col-hdr{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);
  font-family:'IBM Plex Mono',monospace;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.board-count{font-size:9px;background:rgba(255,255,255,.08);border-radius:10px;padding:1px 7px}
.task-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-top:2px solid;
  border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.prog-bg{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:5px}
.prog-fg{height:100%;border-radius:2px;transition:width 1s}

/* MOBILE MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal-sheet{background:#0f111e;border-radius:16px 16px 0 0;width:100%;max-height:80vh;
  overflow-y:auto;padding:0 0 16px;-webkit-overflow-scrolling:touch}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:12px auto 16px}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:.06em}
.loading-logo span{color:var(--gold)}
.loading-bar-wrap{width:200px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.loading-bar-fill{height:100%;background:var(--gold);border-radius:2px;animation:loadBar 1.5s ease-in-out infinite}
@keyframes loadBar{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.loading-status{font-size:11px;color:rgba(255,255,255,0.4);font-family:'IBM Plex Mono',monospace}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes ping{75%,100%{transform:scale(2.2);opacity:0}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loading">

</div>

<!-- HEADER -->

<!-- TABS -->

      <div class="feed-inner">

        <div id="feed-list"></div>
      </div>
    </div>
  </div>

  <!-- TASKS TAB -->
  <div class="view" id="view-tasks">
    <div class="board-wrap">
      <div class="board-cols" id="board-cols"></div>
    </div>
  </div>

</div>

<!-- REFRESH BAR -->
<div class="refresh-bar">
  <div class="refresh-text" id="refresh-text">Refreshing in 30s</div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="refresh-progress"><div class="refresh-bar-fill" id="refresh-fill" style="width:100%"></div></div>
    <button onclick="manualRefresh()" style="background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:5px;color:rgba(255,255,255,0.4);cursor:pointer;padding:3px 8px;font-size:9px;font-family:'IBM Plex Mono',monospace">↻</button>
  </div>
</div>

<!-- MOBILE MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-sheet"><div class="modal-handle"></div><div id="modal-content" style="padding:0 16px 16px"></div></div>
</div>

// ═══════════════════════════════════════════
// DATA FETCHING
// ═══════════════════════════════════════════
async function fetchData() {
  if (!CONFIG.LIVE_MODE) {
    mergeData(DEMO_STATUS);
    return;
  }
  try {
    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CONFIG.STATUS_TAB)}&t=${Date.now()}`;
    const res = await fetch(url);
    const csv = await res.text();
    const rows = parseCSV(csv);
    if (rows.length < 2) throw new Error('No data');
    const headers = rows[0].map(h => h.trim().toLowerCase().replace(/\s+/g,'_'));
    const map = {};
    rows.slice(1).forEach(row => {
      const obj = {};
      headers.forEach((h,i) => obj[h] = (row[i]||'').trim());
      if (obj.agent_id) {
        map[obj.agent_id] = {
          status: obj.status || 'idle',
          task: obj.task || 'No active task',
          progress: parseInt(obj.progress)||0,
          thread: obj.thread || '',
          location: obj.location || (obj.status==='idle'?'break':'desk'),
        };
      }
    });
    mergeData(map);
    document.getElementById('live-label').textContent = 'LIVE';
  } catch(e) {
    mergeData(DEMO_STATUS);
    document.getElementById('live-label').textContent = 'DEMO';
  }
}

function parseCSV(text) {
  const rows = []; let cur = []; let field = ''; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){cur.push(field);field='';}
    else if((c==='\n'||c==='\r')&&!inQ){cur.push(field);if(cur.some(x=>x))rows.push(cur);cur=[];field='';if(c==='\r'&&text[i+1]==='\n')i++;}
    else{field+=c;}
  }
  if(field||cur.length){cur.push(field);if(cur.some(x=>x))rows.push(cur);}
  return rows;
}

function mergeData(statusMap) {
  agentData = {};
  Object.entries(AGENT_META).forEach(([id, meta]) => {
    const s = statusMap[id] || {status:'idle',task:'No active task',progress:0,thread:'',location:'break'};
    agentData[id] = {...meta, ...s};
  });
}

// ═══════════════════════════════════════════
// POSITION RESOLVER
// Figures out WHERE each agent should be based
// on their location field
// ═══════════════════════════════════════════
function resolvePosition(id) {
  const a = agentData[id];
  if (!a) return POSITIONS.desk[id] || {x:100,y:100};

  const loc = a.location || 'desk';

  // Explicit meeting location e.g. "meeting:conf-a"
  if (loc.startsWith('meeting:')) {
    const confId = loc.replace('meeting:','');
    const confSeats = POSITIONS.conference[confId];
    if (confSeats && confSeats[id]) return confSeats[id];
    // fallback to desk if no seat assigned
    return POSITIONS.desk[id] || {x:100,y:100};
  }

  // Break room
  if (loc === 'break' || a.status === 'idle') {
    return getBreakRoomSpot(id);
  }

  // Default: home desk
  return POSITIONS.desk[id] || {x:100,y:100};
}

// Assign break room spots to idle agents
const breakRoomAssignments = {};
let breakRoomIndex = 0;

function getBreakRoomSpot(id) {
  if (breakRoomAssignments[id]) return breakRoomAssignments[id];
  const spot = POSITIONS.breakRoom[breakRoomIndex % POSITIONS.breakRoom.length];
  breakRoomAssignments[id] = spot;
  breakRoomIndex++;
  return spot;
}

function clearBreakRoomAssignments() {
  // Only clear for agents that are now active
  Object.keys(breakRoomAssignments).forEach(id => {
    if (agentData[id] && agentData[id].status === 'active' && agentData[id].location !== 'break') {
      delete breakRoomAssignments[id];
    }
  });
}

  document.querySelectorAll('.agent-avatar').forEach(el => el.remove());
  agentElements = {};

  Object.keys(AGENT_META).forEach(id => {
    const meta = AGENT_META[id];
    const el = document.createElement('div');
    el.className = 'agent-avatar';
    el.id = `avatar-${id}`;
    el.innerHTML = `
      <div class="agent-task-bubble" id="bubble-${id}">
        <div class="bubble-name" id="bn-${id}" style="color:${meta.color}">${meta.avatar} ${meta.name}</div>
        <div class="bubble-title">${meta.title}</div>
        <div class="bubble-task" id="bt-${id}">Loading...</div>
        <div class="bubble-progress-wrap"><div class="bubble-progress-fill" id="bp-${id}" style="background:${meta.color}"></div></div>
        <div class="bubble-thread" id="bth-${id}"></div>
        <div class="bubble-location" id="bloc-${id}"></div>
      </div>
      <div class="agent-shadow"></div>
      <div class="agent-emoji-wrap" id="emoji-${id}" style="border-color:${meta.color};background:${meta.color}18">
        <div class="agent-pulse" id="pulse-${id}" style="border-color:${meta.color}"></div>
        <span style="font-size:18px">${meta.avatar}</span>
      </div>
      <div class="agent-name-tag" id="nametag-${id}" style="color:${meta.color};border-color:${meta.color}30">
        ${meta.name}
      </div>
      <div class="walking-dots">
        <div class="walking-dot"></div>
        <div class="walking-dot"></div>
        <div class="walking-dot"></div>
      </div>
    `;

    // Click/tap handler
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      handleAgentTap(id);
    });

    fp.appendChild(el);
    agentElements[id] = el;
  });

  // Click floor to deselect
  document.getElementById('fp').addEventListener('click', () => {
    document.querySelectorAll('.agent-avatar').forEach(el => el.classList.remove('selected'));
  });
}

// ═══════════════════════════════════════════
// MOVE AGENTS
// The core animation function
// ═══════════════════════════════════════════
function moveAgents(animate = true) {
  clearBreakRoomAssignments();

  // First pass: assign break room spots to all idle agents
  Object.keys(agentData).forEach(id => {
    const a = agentData[id];
    if (a.status === 'idle' || a.location === 'break') {
      getBreakRoomSpot(id); // pre-assign spots
    }
  });

  let activeCount = 0;
  let idleCount = 0;

  Object.keys(agentData).forEach(id => {
    const a = agentData[id];
    const el = agentElements[id];
    if (!el) return;

    const targetPos = resolvePosition(id);
    const isActive = a.status === 'active' && a.location !== 'break';
    const isIdle = !isActive;

    if (isActive) activeCount++;
    else idleCount++;

    // Check if position changed — trigger walk animation
    const prevPos = currentPositions[id];
    const moved = !prevPos || prevPos.x !== targetPos.x || prevPos.y !== targetPos.y;

    if (moved && animate && prevPos) {
      // Start walking
      el.classList.add('walking');
      setTimeout(() => el.classList.remove('walking'), 1600);
    }

    // Move the agent
    el.style.left = targetPos.x + 'px';
    el.style.top = targetPos.y + 'px';
    currentPositions[id] = targetPos;

    // Update visual state
    const emojiWrap = document.getElementById(`emoji-${id}`);
    const nameTag = document.getElementById(`nametag-${id}`);
    const pulseEl = document.getElementById(`pulse-${id}`);

    if (emojiWrap) {
      emojiWrap.className = `agent-emoji-wrap ${isIdle ? 'idle' : ''}`;
    }
    if (pulseEl) {
      pulseEl.style.display = isActive ? 'block' : 'none';
    }
    if (nameTag) {
      nameTag.style.opacity = isIdle ? '0.4' : '1';
    }

    // Update task bubble content
    updateBubble(id, a);
  });

  // Update stats
  document.getElementById('stat-active').textContent = activeCount;
  document.getElementById('stat-idle').textContent = idleCount;
}

function updateBubble(id, a) {
  const taskEl = document.getElementById(`bt-${id}`);
  const progEl = document.getElementById(`bp-${id}`);
  const threadEl = document.getElementById(`bth-${id}`);
  const locEl = document.getElementById(`bloc-${id}`);

  if (taskEl) taskEl.textContent = a.task || 'No active task';
  if (progEl) {
    progEl.style.width = (a.progress || 0) + '%';
    progEl.style.boxShadow = `0 0 6px ${a.color}60`;
  }
  if (threadEl) threadEl.textContent = a.thread || '';
  if (locEl) {
    const loc = a.location || '';
    let locLabel = '🏢 At desk';
    if (loc === 'break' || a.status === 'idle') locLabel = '☕ Break Room';
    else if (loc.includes('conf-a')) locLabel = '📍 Conference A';
    else if (loc.includes('conf-b')) locLabel = '📍 Conference B';
    else if (loc.includes('marketing-studio')) locLabel = '📍 Marketing Studio';
    else if (loc.includes('war-room')) locLabel = '📍 Recruiting War Room';
    locEl.textContent = locLabel;
    locEl.style.color = a.color;
  }
}

// ═══════════════════════════════════════════
// TAP HANDLER
// ═══════════════════════════════════════════
function handleAgentTap(id) {
  const allAvatars = document.querySelectorAll('.agent-avatar');
  const el = agentElements[id];

  // Deselect all others
  allAvatars.forEach(a => { if (a !== el) a.classList.remove('selected'); });

  // Toggle this one
  el.classList.toggle('selected');

  // On mobile show modal too
  if (window.innerWidth < 768) {
    const a = agentData[id];
    if (!a) return;
    const isActive = a.status === 'active';
    document.getElementById('modal-content').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.06)">
        <div style="width:46px;height:46px;border-radius:12px;background:${a.color}20;border:1px solid ${a.color}40;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${a.avatar}</div>
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:${a.color}">${a.name}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px">${a.title}</div>
          <div style="font-size:10px;margin-top:4px;color:${isActive?'#34d399':'rgba(255,255,255,0.3)'}">${isActive?'● Active':'○ In Break Room'}</div>
        </div>
      </div>
      ${isActive ? `
      <div style="margin-bottom:12px">
        <div style="font-size:8px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.1em;font-family:'IBM Plex Mono',monospace;margin-bottom:6px">Current Task</div>
        <div style="padding:10px;background:rgba(255,255,255,0.03);border-left:3px solid ${a.color};border-radius:8px">
          <div style="font-size:11px;color:rgba(255,255,255,0.75);line-height:1.5;margin-bottom:6px">${a.task}</div>
          <div style="display:flex;justify-content:space-between;font-size:9px;margin-bottom:3px"><span style="color:rgba(255,255,255,0.3)">Progress</span><span style="color:${a.color};font-family:'IBM Plex Mono',monospace">${a.progress}%</span></div>
          <div style="height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden"><div style="height:100%;width:${a.progress}%;background:${a.color};box-shadow:0 0 8px ${a.color}60;border-radius:2px"></div></div>
          <div style="margin-top:6px;font-size:9px;color:rgba(255,255,255,0.3)">${a.thread}</div>
        </div>
      </div>` : `
      <div style="padding:10px;background:rgba(255,255,255,0.02);border-radius:8px;text-align:center;color:rgba(255,255,255,0.4);font-size:11px">☕ Taking a break — no active task</div>`}
      <div style="margin-top:12px">
        <div style="font-size:8px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.1em;font-family:'IBM Plex Mono',monospace;margin-bottom:6px">Active Skill</div>
        <div style="padding:6px 10px;background:rgba(255,255,255,0.03);border-radius:6px;font-size:9px;color:rgba(255,255,255,0.3);font-family:'IBM Plex Mono',monospace">${a.skill}.md</div>
      </div>
    `;
    document.getElementById('modal').classList.add('open');
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

// ═══════════════════════════════════════════
// OTHER TABS
// ═══════════════════════════════════════════
function buildActivity() {
  document.getElementById('feed-label').textContent =
    'Activity Log — ' + new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const list = document.getElementById('feed-list');
  list.innerHTML = '';
  [...ACTIVITY_LOG].reverse().forEach((item, i) => {
    const a = agentData[item.agent]; if (!a) return;
    const tc = TYPE_COLORS[item.type] || '#888';
    list.innerHTML += `<div class="feed-item" style="border-left-color:${tc};animation:fadeUp .2s ease ${i*0.02}s both">
      <div style="flex-shrink:0;font-size:20px;padding-top:1px">${a.avatar}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
          <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,.85);font-family:'IBM Plex Mono',monospace">${a.name}</span>
          <span style="font-size:8px;padding:1px 6px;border-radius:3px;background:${tc}20;color:${tc};font-family:'IBM Plex Mono',monospace">${item.type.toUpperCase()}</span>
          <span style="margin-left:auto;font-size:9px;color:rgba(255,255,255,.3);font-family:'IBM Plex Mono',monospace;flex-shrink:0">${item.time}</span>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,.55);line-height:1.5">${item.action}</div>
      </div>
    </div>`;
  });
}

function buildBoard() {
  const cols = document.getElementById('board-cols');
  cols.innerHTML = '';
  const colDefs = [
    {label:'🟢 In Progress',color:'#34d399',filter:a=>a.status==='active'&&a.progress>0&&a.progress<80},
    {label:'✅ Near Complete',color:'#D4AF37',filter:a=>a.status==='active'&&a.progress>=80},
    {label:'☕ Break Room',color:'rgba(255,255,255,.2)',filter:a=>a.status==='idle'||a.location==='break'},
  ];
  colDefs.forEach(col => {
    const agents = Object.entries(agentData).filter(([,a])=>col.filter(a));
    let html = `<div><div class="board-col-hdr">${col.label}<span class="board-count">${agents.length}</span></div>`;
    agents.forEach(([id,a]) => {
      html += `<div class="task-card" style="border-top-color:${a.color}" onclick="handleAgentTap('${id}')">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:${a.status==='active'?'6px':'0'}">
          <span style="font-size:14px">${a.avatar}</span>
          <span style="font-size:11px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:rgba(255,255,255,.85)">${a.name}</span>
          ${a.status==='active'?`<span style="margin-left:auto;font-size:9px;color:${a.color};font-family:'IBM Plex Mono',monospace">${a.progress}%</span>`:''}
        </div>
        <div style="font-size:10px;color:rgba(255,255,255,.45);line-height:1.4;margin-bottom:${a.status==='active'?'5px':'0'}">${a.task}</div>
        ${a.status==='active'?`<div class="prog-bg"><div class="prog-fg" style="width:${a.progress}%;background:${a.color}"></div></div>`:''}
        <div style="margin-top:5px;font-size:9px;color:rgba(255,255,255,.2)">${a.thread}</div>
      </div>`;
    });
    html += `</div>`;
    cols.innerHTML += html;
  });
}

// ═══════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  currentTab = tab;
}

// ═══════════════════════════════════════════
// REFRESH SYSTEM
// ═══════════════════════════════════════════
async function doRefresh(animate = true) {
  await fetchData();
  moveAgents(animate);
  buildActivity();
  buildBoard();
  const now = new Date();
  document.getElementById('refresh-text').textContent =
    `Updated ${now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
}

function manualRefresh() {
  clearInterval(refreshTimer);
  doRefresh(true).then(() => startTimer());
}

function startTimer() {
  refreshCountdown = CONFIG.REFRESH_INTERVAL / 1000;
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    refreshCountdown--;
    const pct = (refreshCountdown / (CONFIG.REFRESH_INTERVAL / 1000)) * 100;
    document.getElementById('refresh-fill').style.width = pct + '%';
    document.getElementById('refresh-text').textContent = `Refreshing in ${refreshCountdown}s`;
    if (refreshCountdown <= 0) {
      clearInterval(refreshTimer);
      doRefresh(true).then(() => startTimer());
    }
  }, 1000);
}

// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + ' · ' +
    now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
updateClock();
setInterval(updateClock, 1000);

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
  document.getElementById('loading-status').textContent = 'Loading agent data...';
  await fetchData();
  document.getElementById('loading-status').textContent = 'Building your office...';
  buildFloor();
  createAgentAvatars();
  document.getElementById('loading-status').textContent = 'Placing your team...';
  // Place agents instantly on first load (no animation)
  moveAgents(false);
  buildActivity();
  buildBoard();
  switchTab('office');
  document.getElementById('loading').classList.add('hidden');
  setTimeout(() => document.getElementById('loading').remove(), 500);
  startTimer();
}

init();
</script>
