<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="REALTY OS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07090f">
<title>REALTY OS — Live Office</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--border:rgba(255,255,255,0.06);
  --gold:#D4AF37;--red:#E8634A;--green:#6DC86D;--purple:#A78BFA;--blue:#60A5FA;--emerald:#34d399;--amber:#FBBF24;
  --wall:#1a1d2e;--wall-light:#252840;--desk:#1c1f30;--table:#181b2c;--chair:#161826;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:rgba(255,255,255,0.88);
  font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:50px;
  background:rgba(7,9,15,0.98);border-bottom:1px solid var(--border);flex-shrink:0;z-index:200}
.logo-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#D4AF37,#9a7b1a);
  display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#000;font-family:'Syne',sans-serif}
.logo-text{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.06em}
.logo-text span{color:#D4AF37}
.stat-pill{display:flex;align-items:center;gap:5px;padding:3px 8px;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:20px;font-size:9px;font-family:'IBM Plex Mono',monospace}
.live-badge{display:flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(52,211,153,0.1);
  border:1px solid rgba(52,211,153,0.2);border-radius:20px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--emerald)}
.live-text{font-size:9px;color:var(--emerald);font-family:'IBM Plex Mono',monospace}

/* TABS */
.tab-bar{display:flex;padding:0 4px;background:rgba(7,9,15,0.95);border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 14px;background:none;border:none;border-bottom:2px solid transparent;
  color:rgba(255,255,255,0.3);font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;
  letter-spacing:.02em;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab-btn.active{border-bottom-color:var(--gold);color:var(--gold)}

/* MAIN */
.main-layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 100px)}
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex}

/* FLOOR WRAP */
.floor-wrap{flex:1;overflow:auto;background:radial-gradient(circle at 50% 50%,#0d0f1a,#080a12);
  position:relative;-webkit-overflow-scrolling:touch}

/* FLOOR PLAN */
.fp{position:relative;width:1500px;height:900px;
  background-image:radial-gradient(circle,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:28px 28px;background-position:14px 14px}
.fp::before{content:'';position:absolute;inset:0;border:3px solid var(--wall-light);pointer-events:none;z-index:1}

/* ROOMS */
.room{position:absolute;border:2px solid var(--wall);border-radius:1px}
.room-label{position:absolute;top:5px;left:50%;transform:translateX(-50%);
  font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.08em;
  white-space:nowrap;opacity:.45;text-transform:uppercase;z-index:2;pointer-events:none}
.room-badge{position:absolute;top:4px;right:4px;font-size:7px;padding:2px 5px;
  border-radius:3px;font-family:'IBM Plex Mono',monospace;pointer-events:none}
.win{position:absolute;background:linear-gradient(90deg,rgba(144,200,255,0.12),rgba(144,200,255,0.06));border-radius:1px}
.win-h{height:5px;left:20px;right:20px}
.win-v{width:5px;top:20px;bottom:20px}
.room-ambient{position:absolute;inset:0;border-radius:1px;pointer-events:none}

/* FURNITURE */
.desk-furniture{position:absolute;background:var(--desk);border:1px solid #262a42;border-radius:3px;z-index:3;pointer-events:none}
.desk-top-strip{position:absolute;top:0;left:0;right:0;height:4px;border-radius:2px 2px 0 0}
.conf-table-furniture{position:absolute;background:var(--table);border:1px solid #2a2d45;border-radius:50%;z-index:3;pointer-events:none}
.chair-furniture{position:absolute;background:var(--chair);border:1px solid #1e2236;border-radius:50%;width:12px;height:12px;z-index:2;pointer-events:none}
.plant{position:absolute;font-size:18px;z-index:4;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.couch-f{position:absolute;background:#13152a;border:1px solid #252840;border-radius:4px;z-index:3;pointer-events:none}
.cabinet-f{position:absolute;background:#151826;border:1px solid #1e2138;border-radius:2px;z-index:3;pointer-events:none}

/* ═══════════════════════════════════════════
   AGENT AVATARS — FREE FLOATING
   Each agent is absolutely positioned on the floor
   and transitions smoothly to new positions
═══════════════════════════════════════════ */
.agent-avatar{
  position:absolute;
  z-index:20;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  /* THE WALKING ANIMATION — smooth 1.5s glide */
  transition: left 1.5s cubic-bezier(0.4, 0, 0.2, 1),
              top  1.5s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.5s ease;
  transform: translate(-50%, -50%);
  -webkit-tap-highlight-color:transparent;
}
.agent-avatar:hover .agent-task-bubble{display:flex}
.agent-avatar.selected .agent-task-bubble{display:flex}

/* Professional human-style avatar portrait */
.agent-emoji-wrap{
  position:relative;
  width:32px;height:32px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  border:2px solid;
  transition:all 0.3s;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.agent-emoji-wrap.idle{
  opacity:0.5;
  filter:grayscale(0.4);
}
.agent-portrait{
  position:relative;
  width:38px;height:38px;
  border-radius:50%;
  border:2px solid;
  overflow:hidden;
  background:linear-gradient(180deg,#23283a,#10131f);
  box-shadow:0 5px 14px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.18);
  transition:all .3s;
}
.agent-photo{
  width:42px;height:42px;
  border-radius:50%;
  border:2px solid;
  object-fit:cover;
  object-position:center;
  display:block;
  background:#151826;
  box-shadow:0 6px 16px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.2);
  filter:saturate(.95) contrast(1.04);
}
.agent-photo.idle{opacity:.5;filter:grayscale(.4) saturate(.75)}
.agent-portrait.idle{opacity:.48;filter:grayscale(.35)}
.portrait-neck{position:absolute;left:15px;top:25px;width:9px;height:9px;background:var(--skin);border-radius:0 0 5px 5px;z-index:2}
.portrait-suit{position:absolute;left:7px;right:7px;bottom:-1px;height:14px;background:linear-gradient(135deg,var(--suit),#080a12);border-radius:10px 10px 0 0;z-index:3}
.portrait-shirt{position:absolute;left:16px;bottom:1px;width:7px;height:11px;background:#eef2f7;clip-path:polygon(50% 0,100% 100%,0 100%);z-index:4;opacity:.9}
.portrait-face{position:absolute;left:10px;top:8px;width:18px;height:21px;background:var(--skin);border-radius:48% 48% 46% 46%;z-index:5;box-shadow:inset -3px -2px 0 rgba(0,0,0,.07)}
.portrait-hair{position:absolute;left:8px;top:5px;width:22px;height:14px;background:var(--hair);border-radius:12px 12px 8px 8px;z-index:6}
.portrait-hair.short{height:9px;border-radius:12px 12px 5px 5px}
.portrait-hair.long{left:7px;top:5px;width:24px;height:22px;border-radius:13px 13px 9px 9px}
.portrait-hair.bob{left:7px;top:5px;width:24px;height:18px;border-radius:13px 13px 7px 7px}
.portrait-hair.bald{display:none}
.portrait-eye{position:absolute;top:16px;width:2px;height:2px;border-radius:50%;background:#171717;z-index:7}
.portrait-eye.left{left:15px}.portrait-eye.right{right:15px}
.portrait-mouth{position:absolute;left:17px;top:23px;width:5px;height:2px;border-radius:0 0 6px 6px;border-bottom:1px solid rgba(80,30,30,.45);z-index:7}
.portrait-accent{position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--accent);z-index:8;opacity:.9}
.portrait-glasses::before,.portrait-glasses::after{content:'';position:absolute;top:15px;width:6px;height:4px;border:1px solid rgba(20,20,20,.7);border-radius:4px;z-index:8}
.portrait-glasses::before{left:11px}.portrait-glasses::after{right:11px}
.portrait-glasses span{position:absolute;left:17px;top:17px;width:4px;height:1px;background:rgba(20,20,20,.55);z-index:8}

/* Pulse ring for active agents */
.agent-pulse{
  position:absolute;inset:-3px;
  border-radius:50%;
  border:2px solid;
  animation:agentPing 2s ease-in-out infinite;
  opacity:0;
}
@keyframes agentPing{
  0%{transform:scale(1);opacity:0.6}
  100%{transform:scale(1.8);opacity:0}
}

/* Name tag */
.agent-name-tag{
  background:rgba(7,9,15,0.9);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;
  padding:2px 7px;
  font-size:8px;
  font-family:'IBM Plex Mono',monospace;
  white-space:nowrap;
  font-weight:500;
  backdrop-filter:blur(4px);
  transition:all 0.3s;
}

/* Task bubble — shows on hover/tap */
.agent-task-bubble{
  display:none;
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%;
  transform:translateX(-50%);
  background:rgba(10,12,24,0.97);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;
  padding:8px 10px;
  width:180px;
  flex-direction:column;
  gap:4px;
  z-index:30;
  box-shadow:0 8px 24px rgba(0,0,0,0.6);
  pointer-events:none;
}
.bubble-name{font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.bubble-title{font-size:8px;color:rgba(255,255,255,0.4);margin-bottom:2px}
.bubble-task{font-size:9px;color:rgba(255,255,255,0.7);line-height:1.4}
.bubble-progress-wrap{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:2px}
.bubble-progress-fill{height:100%;border-radius:2px;transition:width 0.5s}
.bubble-thread{font-size:8px;color:rgba(255,255,255,0.3);margin-top:2px}
.bubble-location{font-size:8px;margin-top:1px}
/* Arrow pointing down */
.agent-task-bubble::after{
  content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:rgba(255,255,255,0.15);
}

/* Walking dots animation */
.walking-dots{
  display:none;
  position:absolute;
  bottom:-14px;
  left:50%;
  transform:translateX(-50%);
  gap:3px;
}
.agent-avatar.walking .walking-dots{display:flex}
.walking-dot{
  width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.4);
}
.walking-dot:nth-child(1){animation:walkBounce 0.6s ease-in-out infinite}
.walking-dot:nth-child(2){animation:walkBounce 0.6s ease-in-out 0.2s infinite}
.walking-dot:nth-child(3){animation:walkBounce 0.6s ease-in-out 0.4s infinite}
@keyframes walkBounce{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-3px);opacity:1}}

/* Shadow under walking agents */
.agent-shadow{
  position:absolute;
  bottom:-4px;left:50%;transform:translateX(-50%);
  width:24px;height:6px;
  background:rgba(0,0,0,0.3);
  border-radius:50%;
  filter:blur(2px);
}

/* REFRESH BAR */
.refresh-bar{padding:5px 16px;background:rgba(7,9,15,0.95);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.refresh-text{font-size:8px;color:rgba(255,255,255,0.25);font-family:'IBM Plex Mono',monospace}
.refresh-progress{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;overflow:hidden;width:100px}
.refresh-bar-fill{height:100%;background:var(--gold);border-radius:1px;transition:width 0.5s linear}

/* ACTIVITY & TASKS TABS */
.feed-wrap{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.feed-inner{max-width:780px;margin:0 auto}
.feed-item{display:flex;gap:12px;padding:10px 14px;background:rgba(255,255,255,0.025);
  border:1px solid var(--border);border-left:3px solid;border-radius:8px;margin-bottom:6px}
.board-wrap{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.board-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;max-width:1100px;margin:0 auto}
@media(max-width:700px){.board-cols{grid-template-columns:1fr 1fr}}
@media(max-width:450px){.board-cols{grid-template-columns:1fr}}
.board-col-hdr{font-size:10px;font-weight:700;color:rgba(255,255,255,.6);
  font-family:'IBM Plex Mono',monospace;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.board-count{font-size:9px;background:rgba(255,255,255,.08);border-radius:10px;padding:1px 7px}
.task-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-top:2px solid;
  border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer}
.prog-bg{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:5px}
.prog-fg{height:100%;border-radius:2px;transition:width 1s}

/* AGENT CHAT */
.chat-dock{
  position:fixed;
  right:16px;
  bottom:42px;
  width:min(390px,calc(100vw - 24px));
  height:min(570px,calc(100vh - 116px));
  background:rgba(12,14,24,.98);
  border:1px solid rgba(255,255,255,.12);
  border-radius:14px;
  box-shadow:0 24px 80px rgba(0,0,0,.58);
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:460;
  backdrop-filter:blur(16px);
}
.chat-dock.open{display:flex}
.chat-head{
  padding:14px 14px 12px;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;
  align-items:center;
  gap:11px;
  flex-shrink:0;
}
.chat-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;line-height:1.1}
.chat-role{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px}
.chat-state{font-size:9px;font-family:'IBM Plex Mono',monospace;margin-top:5px}
.chat-close{
  margin-left:auto;
  width:28px;
  height:28px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.55);
  cursor:pointer;
}
.voice-tools{
  display:flex;
  gap:6px;
  margin-left:auto;
}
.voice-btn{
  width:30px;
  height:30px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.58);
  cursor:pointer;
  font-size:13px;
}
.voice-btn.active{
  border-color:rgba(52,211,153,.48);
  background:rgba(52,211,153,.14);
  color:#6ee7b7;
}
.voice-btn.listening{
  border-color:rgba(248,113,113,.55);
  background:rgba(248,113,113,.16);
  color:#fca5a5;
  animation:pulse 1s infinite;
}
.voice-status{
  padding:7px 14px 0;
  min-height:18px;
  font-size:9px;
  color:rgba(255,255,255,.35);
  font-family:'IBM Plex Mono',monospace;
}
.chat-sync-row{
  display:flex;
  align-items:center;
  gap:6px;
  padding:7px 14px 0;
  font-size:9px;
  color:rgba(255,255,255,.34);
  font-family:'IBM Plex Mono',monospace;
}
.chat-sync-status{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-sync-btn{
  border:1px solid rgba(255,255,255,.11);
  background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.58);
  border-radius:7px;
  padding:4px 7px;
  font-size:9px;
  font-family:'IBM Plex Mono',monospace;
  cursor:pointer;
}
.chat-context{
  padding:10px 14px;
  border-bottom:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.025);
  font-size:10px;
  line-height:1.45;
  color:rgba(255,255,255,.48);
}
.chat-context strong{color:rgba(255,255,255,.78);font-weight:600}
.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:9px;
}
.chat-msg{
  max-width:86%;
  padding:9px 10px;
  border-radius:12px;
  font-size:11px;
  line-height:1.48;
  white-space:pre-wrap;
}
.chat-msg.agent{
  align-self:flex-start;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.07);
  color:rgba(255,255,255,.72);
  border-top-left-radius:4px;
}
.chat-msg.user{
  align-self:flex-end;
  background:rgba(212,175,55,.14);
  border:1px solid rgba(212,175,55,.28);
  color:rgba(255,255,255,.86);
  border-top-right-radius:4px;
}
.chat-chips{
  padding:0 14px 10px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  border-top:1px solid rgba(255,255,255,.06);
  padding-top:10px;
}
.chat-chip{
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.035);
  color:rgba(255,255,255,.56);
  border-radius:999px;
  padding:6px 8px;
  font-size:9px;
  cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
}
.chat-input-row{
  display:flex;
  gap:8px;
  padding:10px 14px 14px;
  border-top:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}
.chat-input{
  flex:1;
  min-width:0;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(0,0,0,.2);
  color:rgba(255,255,255,.82);
  border-radius:9px;
  padding:9px 10px;
  font-size:11px;
  outline:none;
}
.chat-input:focus{border-color:rgba(212,175,55,.45)}
.chat-send{
  border:1px solid rgba(212,175,55,.38);
  background:rgba(212,175,55,.16);
  color:#f6d979;
  border-radius:9px;
  padding:0 12px;
  font-size:10px;
  font-family:'IBM Plex Mono',monospace;
  cursor:pointer;
}
@media(max-width:700px){
  .chat-dock{left:0;right:0;bottom:0;width:100%;height:74vh;border-radius:16px 16px 0 0}
}

/* MOBILE MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal-sheet{background:#0f111e;border-radius:16px 16px 0 0;width:100%;max-height:80vh;
  overflow-y:auto;padding:0 0 16px;-webkit-overflow-scrolling:touch}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:12px auto 16px}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:.06em}
.loading-logo span{color:var(--gold)}
.loading-bar-wrap{width:200px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.loading-bar-fill{height:100%;background:var(--gold);border-radius:2px;animation:loadBar 1.5s ease-in-out infinite}
@keyframes loadBar{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.loading-status{font-size:11px;color:rgba(255,255,255,0.4);font-family:'IBM Plex Mono',monospace}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes ping{75%,100%{transform:scale(2.2);opacity:0}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
</style>
</head>
<body>

<!-- LOADING -->

function getAgentRuntimeBaseUrl() {
  const params = new URLSearchParams(window.location.search);
  const paramUrl = params.get('agentRuntime');
  if (paramUrl) {
    const cleanUrl = paramUrl.trim().replace(/\/+$/, '');
    localStorage.setItem('realtyOsAgentRuntimeUrl', cleanUrl);
    return cleanUrl;
  }
  const savedUrl = localStorage.getItem('realtyOsAgentRuntimeUrl');
  return (REALTY_OS_CONFIG.agentRuntimeUrl || savedUrl || REALTY_OS_CONFIG.defaultAgentRuntimeUrl).replace(/\/+$/, '');
}

function getAgentRuntimeChatUrl() {
  return `${getAgentRuntimeBaseUrl()}/api/agents/chat`;

// ═══════════════════════════════════════════
async function fetchData() {
  if (!CONFIG.LIVE_MODE) {
    mergeData(DEMO_STATUS);
    return;
  }
  try {
    const localRes = await fetch(`${CONFIG.LOCAL_STATUS_URL}?t=${Date.now()}`, {cache:'no-store'});
    if (localRes.ok) {
      const local = await localRes.json();
      if (local && local.agents) {
        mergeData(local.agents);
        if (Array.isArray(local.activity)) activityLog = [...local.activity, ...ACTIVITY_LOG].slice(0, 30);
        const label = local.metrics ? `LIVE · ${local.metrics.realty_jobs || 0} JOBS` : 'LIVE LOCAL';
        document.getElementById('live-label').textContent = label;
        return;
      }
    }
    throw new Error('Local status unavailable');
  } catch(localError) {
    // Fall through to Google Sheet, then demo mode.
  }
  try {
    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CONFIG.STATUS_TAB)}&t=${Date.now()}`;
    const res = await fetch(url);
    const csv = await res.text();
    const rows = parseCSV(csv);
    if (rows.length < 2) throw new Error('No data');
    const headers = rows[0].map(h => h.trim().toLowerCase().replace(/\s+/g,'_'));
    const map = {};
    rows.slice(1).forEach(row => {
      const obj = {};
      headers.forEach((h,i) => obj[h] = (row[i]||'').trim());
      if (obj.agent_id) {
        map[obj.agent_id] = {
          status: obj.status || 'idle',
          task: obj.task || 'No active task',
          progress: parseInt(obj.progress)||0,
          thread: obj.thread || '',
          location: obj.location || (obj.status==='idle'?'break':'desk'),
        };
      }
    });
    mergeData(map);
    document.getElementById('live-label').textContent = 'LIVE · SHEET';
  } catch(e) {
    mergeData(DEMO_STATUS);
    document.getElementById('live-label').textContent = 'DEMO';
  }
}

function parseCSV(text) {
  const rows = []; let cur = []; let field = ''; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){cur.push(field);field='';}
    else if((c==='\n'||c==='\r')&&!inQ){cur.push(field);if(cur.some(x=>x))rows.push(cur);cur=[];field='';if(c==='\r'&&text[i+1]==='\n')i++;}
    else{field+=c;}
  }
  if(field||cur.length){cur.push(field);if(cur.some(x=>x))rows.push(cur);}
  return rows;
}

function mergeData(statusMap) {
  agentData = {};
  Object.entries(AGENT_META).forEach(([id, meta]) => {
    const s = statusMap[id] || {status:'idle',task:'No active task',progress:0,thread:'',location:'break'};
    agentData[id] = {...meta, ...s};
  });
}

// ═══════════════════════════════════════════
// POSITION RESOLVER
// Figures out WHERE each agent should be based
// on their location field
// ═══════════════════════════════════════════
function resolvePosition(id) {
  const a = agentData[id];
  if (!a) return POSITIONS.desk[id] || {x:100,y:100};

  const loc = a.location || 'desk';

  // Explicit meeting location e.g. "meeting:conf-a"
  if (loc.startsWith('meeting:')) {
    const confId = loc.replace('meeting:','');
    const confSeats = POSITIONS.conference[confId];
    if (confSeats && confSeats[id]) return confSeats[id];
    // fallback to desk if no seat assigned
    return POSITIONS.desk[id] || {x:100,y:100};
  }

  // Break room
  if (loc === 'break' || a.status === 'idle') {
    return getBreakRoomSpot(id);
  }

  // Default: home desk
  const base = POSITIONS.desk[id] || {x:100,y:100};
  if (a.status === 'active') {
    const phase = (Date.now() / 1400) + id.split('').reduce((sum,ch)=>sum+ch.charCodeAt(0),0);
    return {x:base.x + Math.sin(phase) * 7, y:base.y + Math.cos(phase * .85) * 5};
  }
  return base;
}

// Assign break room spots to idle agents
const breakRoomAssignments = {};
let breakRoomIndex = 0;

function getBreakRoomSpot(id) {
  if (breakRoomAssignments[id]) return breakRoomAssignments[id];
  const spot = POSITIONS.breakRoom[breakRoomIndex % POSITIONS.breakRoom.length];
  breakRoomAssignments[id] = spot;
  breakRoomIndex++;
  return spot;
}

function clearBreakRoomAssignments() {
  // Only clear for agents that are now active
  Object.keys(breakRoomAssignments).forEach(id => {
    if (agentData[id] && agentData[id].status === 'active' && agentData[id].location !== 'break') {
      delete breakRoomAssignments[id];
    }
  });
}

// ═══════════════════════════════════════════
// MOVE AGENTS
// The core animation function
// ═══════════════════════════════════════════
function moveAgents(animate = true) {
  clearBreakRoomAssignments();

  // First pass: assign break room spots to all idle agents
  Object.keys(agentData).forEach(id => {
    const a = agentData[id];
    if (a.status === 'idle' || a.location === 'break') {
      getBreakRoomSpot(id); // pre-assign spots
    }
  });

  let activeCount = 0;
  let idleCount = 0;

  Object.keys(agentData).forEach(id => {
    const a = agentData[id];
    const el = agentElements[id];
    if (!el) return;

    const targetPos = resolvePosition(id);
    const isActive = a.status === 'active' && a.location !== 'break';
    const isIdle = !isActive;

    if (isActive) activeCount++;
    else idleCount++;

    // Check if position changed — trigger walk animation
    const prevPos = currentPositions[id];
    const moved = !prevPos || prevPos.x !== targetPos.x || prevPos.y !== targetPos.y;

    if (moved && animate && prevPos) {
      // Start walking
      el.classList.add('walking');
      setTimeout(() => el.classList.remove('walking'), 1600);
    }

    // Move the agent
    el.style.left = targetPos.x + 'px';
    el.style.top = targetPos.y + 'px';
    currentPositions[id] = targetPos;

    // Update visual state
    const emojiWrap = document.getElementById(`emoji-${id}`);
    const nameTag = document.getElementById(`nametag-${id}`);
    const pulseEl = document.getElementById(`pulse-${id}`);

    if (emojiWrap) {
      emojiWrap.className = `agent-emoji-wrap ${isIdle ? 'idle' : ''}`;
      const portrait = emojiWrap.querySelector('.agent-portrait');
      if (portrait) portrait.classList.toggle('idle', isIdle);
    }
    if (pulseEl) {
      pulseEl.style.display = isActive ? 'block' : 'none';
    }
    if (nameTag) {
      nameTag.style.opacity = isIdle ? '0.4' : '1';
    }

    // Update task bubble content
    updateBubble(id, a);
  });

  // Update stats
  document.getElementById('stat-active').textContent = activeCount;
  document.getElementById('stat-idle').textContent = idleCount;
}

function updateBubble(id, a) {
  const taskEl = document.getElementById(`bt-${id}`);
  const progEl = document.getElementById(`bp-${id}`);
  const threadEl = document.getElementById(`bth-${id}`);
  const locEl = document.getElementById(`bloc-${id}`);

  if (taskEl) taskEl.textContent = a.task || 'No active task';
  if (progEl) {
    progEl.style.width = (a.progress || 0) + '%';
    progEl.style.boxShadow = `0 0 6px ${a.color}60`;
  }
  if (threadEl) threadEl.textContent = a.thread || '';
  if (locEl) {
    const loc = a.location || '';
    let locLabel = '🏢 At desk';
    if (loc === 'break' || a.status === 'idle') locLabel = '☕ Break Room';
    else if (loc.includes('conf-a')) locLabel = '📍 Conference A';
    else if (loc.includes('conf-b')) locLabel = '📍 Conference B';
    else if (loc.includes('marketing-studio')) locLabel = '📍 Marketing Studio';
    else if (loc.includes('war-room')) locLabel = '📍 Recruiting War Room';
    locEl.textContent = locLabel;
    locEl.style.color = a.color;
  }
}

function escapeHTML(value) {
  return String(value || '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[ch]));
}

async function initChatSync() {
  try {
    const [appMod, authMod, firestoreMod] = await Promise.all([
      import('https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js'),
      import('https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js')
    ]);
    const app = appMod.getApps().length ? appMod.getApps()[0] : appMod.initializeApp(CONFIG.FIREBASE_CONFIG);
    const auth = authMod.getAuth(app);
    const db = firestoreMod.getFirestore(app);
    chatSync = {
      ...chatSync,
      app,
      auth,
      db,
      api:{...authMod, ...firestoreMod},
      ready:true
    };
    authMod.onAuthStateChanged(auth, user => {
      chatSync.user = user || null;
      updateChatSyncStatus();
      if (user) syncAllLocalChatHistories();
      if (selectedChatAgentId) subscribeChatSyncAgent(selectedChatAgentId);
    });
    updateChatSyncStatus();
  } catch(e) {
    chatSync.ready = false;
    updateChatSyncStatus('Sync unavailable');
  }
}

function updateChatSyncStatus(overrideText = '') {
  const status = document.getElementById('chat-sync-status');
  const signIn = document.getElementById('chat-sync-signin');
  const signOut = document.getElementById('chat-sync-signout');
  if (!status) return;
  if (overrideText) {
    status.textContent = overrideText;
  } else if (!chatSync.ready) {
    status.textContent = 'Sync: local device';
  } else if (!chatSync.user) {
    status.textContent = 'Sync off: sign in on every device';
  } else if (chatSync.syncing) {
    status.textContent = `Sync: uploading local history as ${chatSync.user.email || 'owner'}`;
  } else {
    status.textContent = `Sync: live as ${chatSync.user.email || 'owner'}`;
  }
  if (signIn) signIn.style.display = chatSync.user ? 'none' : '';
  if (signOut) signOut.style.display = chatSync.user ? '' : 'none';
}

async function signInForChatSync() {
  if (!chatSync.ready || !chatSync.auth || !chatSync.api) {
    updateChatSyncStatus('Sync is still loading. Try again in a moment.');
    return;
  }
  const savedEmail = localStorage.getItem('realty-os-sync-email') || 'michaelrossisellsnj@gmail.com';
  const email = window.prompt('REALTY OS sync email', savedEmail);
  if (!email) return;
  const password = window.prompt('REALTY OS sync password');
  if (!password) return;
  try {
    await chatSync.api.signInWithEmailAndPassword(chatSync.auth, email.trim(), password);
    localStorage.setItem('realty-os-sync-email', email.trim());
    updateChatSyncStatus('Sync connected. Uploading local history...');
  } catch(e) {
    updateChatSyncStatus(`Sync sign-in failed: ${e.code || e.message || 'check credentials'}`);
  }
}

async function signOutChatSync() {
  if (chatSync.unsubscribe) chatSync.unsubscribe();
  chatSync.unsubscribe = null;
  chatSync.activeAgentId = null;
  if (chatSync.auth && chatSync.api) await chatSync.api.signOut(chatSync.auth);
  updateChatSyncStatus('Sync signed out.');
}

function getChatSyncMessagesRef(agentId) {
  const api = chatSync.api;
  return api.collection(
    chatSync.db,
    'realtyOsConversations',
    CONFIG.REALTY_OS_SESSION_ID,
    'agents',
    agentId,
    'messages'
  );
}

function subscribeChatSyncAgent(agentId) {
  if (chatSync.unsubscribe && chatSync.activeAgentId !== agentId) {
    chatSync.unsubscribe();
    chatSync.unsubscribe = null;
  }
  chatSync.activeAgentId = agentId;
  if (!chatSync.ready || !chatSync.user || !chatSync.db || !chatSync.api || chatSync.unsubscribe) {
    updateChatSyncStatus();
    return;
  }
  const api = chatSync.api;
  const q = api.query(getChatSyncMessagesRef(agentId), api.orderBy('createdAt', 'asc'), api.limit(80));
  chatSync.unsubscribe = api.onSnapshot(q, snapshot => {
    const remoteMessages = snapshot.docs
      .map(docSnap => {
        const data = docSnap.data() || {};
        return {
          id:data.id || docSnap.id,
          who:data.who === 'user' ? 'user' : 'agent',
          text:String(data.text || ''),
          createdAt:Number(data.clientCreatedAt || 0)
        };
      })
      .filter(msg => msg.text);
    if (remoteMessages.length) {
      chatHistories[agentId] = remoteMessages.slice(-36);
      saveChatHistories();
      if (selectedChatAgentId === agentId) renderAgentChat();
    }
    updateChatSyncStatus();
  }, error => {
    updateChatSyncStatus(`Sync blocked: ${error.code || 'rules/connection'}`);
  });
}

async function writeChatSyncMessage(agentId, message) {
  if (!chatSync.ready || !chatSync.user || !chatSync.db || !chatSync.api || !message) return;
  try {
    const api = chatSync.api;
    const messageId = message.id || `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
    await api.setDoc(
      api.doc(getChatSyncMessagesRef(agentId), messageId),
      {
        id:messageId,
        agentId,
        sessionId:CONFIG.REALTY_OS_SESSION_ID,
        who:message.who === 'user' ? 'user' : 'agent',
        text:String(message.text || ''),
        createdAt:api.serverTimestamp(),
        clientCreatedAt:message.createdAt || Date.now(),
        userId:chatSync.user.uid,
        userEmail:chatSync.user.email || '',
        source:'realty-os-dashboard'
      },
      {merge:true}
    );
  } catch(e) {
    updateChatSyncStatus(`Sync write failed: ${e.code || 'connection'}`);
  }
}

async function syncAllLocalChatHistories() {
  if (!chatSync.ready || !chatSync.user || chatSync.syncing) return;
  const entries = Object.entries(chatHistories || {})
    .filter(([,messages]) => Array.isArray(messages) && messages.length);
  if (!entries.length) return;
  chatSync.syncing = true;
  updateChatSyncStatus();
  try {
    for (const [agentId, messages] of entries) {
      for (const message of messages.slice(-36)) {
        if (!message.id) {
          message.id = `${message.createdAt || Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
        }
        if (!message.createdAt) message.createdAt = Date.now();
        await writeChatSyncMessage(agentId, message);
      }
    }
    saveChatHistories();
    updateChatSyncStatus('Sync connected. Local history uploaded.');
  } finally {
    chatSync.syncing = false;
    updateChatSyncStatus();
  }
}

function openAgentChat(id) {

  document.getElementById('chat-context').innerHTML = `<strong>Current focus:</strong> ${escapeHTML(a.task || 'No active task')}<br><strong>Approval gate:</strong> no outbound messages, pricing, CMA conclusions, CRM edits, or client instructions are sent from this panel.`;
  updateVoiceControls('');

      createChatMessage(
        'agent',
        `Hi Michael. I'm ${a.name}, your ${a.title}. I can brief you on my current work, explain what I need, draft internal/client-facing language for approval, and suggest next moves. I will not send anything or make pricing/client commitments from this chat.`

function closeAgentChat() {

    chatSync.unsubscribe();
    chatSync.unsubscribe = null;
    chatSync.activeAgentId = null;
  }
  stopVoiceListening();
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
}

function renderAgentChat() {
  const box = document.getElementById('chat-messages');
  const history = chatHistories[selectedChatAgentId] || [];
  box.innerHTML = history.map(msg =>
    `<div class="chat-msg ${msg.who === 'user' ? 'user' : 'agent'}">${escapeHTML(msg.text)}</div>`
  ).join('');
  box.scrollTop = box.scrollHeight;
}

function addChatMessage(agentId, who, text) {
  if (!chatHistories[agentId]) chatHistories[agentId] = [];
  const message = createChatMessage(who, text);
  chatHistories[agentId].push(message);
  chatHistories[agentId] = chatHistories[agentId].slice(-36);
  saveChatHistories();
  writeChatSyncMessage(agentId, message);
  return message;
}

function handleChatKey(e) {
  if (e.key === 'Enter') sendAgentChat();
}

function sendQuickChat(text) {
  document.getElementById('chat-input').value = text;
  sendAgentChat();
}

async function sendAgentChat(options = {}) {
  if (!selectedChatAgentId) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  const agentId = selectedChatAgentId;
  const a = agentData[agentId] || AGENT_META[agentId];
  addChatMessage(agentId, 'user', text);
  input.value = '';
  renderAgentChat();

  try {
    updateVoiceControls(`${a.name} is thinking...`);
    const res = await fetch(getAgentRuntimeChatUrl(), {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        agent_id:agentId,
        session_id:'dashboard-michael',
        message:text,
        status:{
          status:a.status,
          task:a.task,
          progress:a.progress,
          thread:a.thread,
          location:a.location
        }
      })
    });
    const result = await res.json();
    if (!res.ok || !result.ok || !result.reply) {
      throw new Error(result.error || `Agent runtime returned ${res.status}`);
    }
    addChatMessage(agentId, 'agent', result.reply);
    renderAgentChat();
    updateVoiceControls(result.mode && result.mode !== 'llm' ? `Live runtime fallback: ${result.mode}` : 'Live agent runtime connected.');
    if (voiceReplyEnabled || options.spoken) speakAgentReply(a, result.reply);
  } catch(e) {
    const reply = generateAgentReply(a, text);
    addChatMessage(agentId, 'agent', reply);
    renderAgentChat();
    updateVoiceControls('Live runtime offline; using local direct-response mode.');
    if (voiceReplyEnabled || options.spoken) speakAgentReply(a, reply);
  }
}

function toggleVoiceReplies() {
  voiceReplyEnabled = !voiceReplyEnabled;
  saveVoicePreference();
  updateVoiceControls(voiceReplyEnabled ? 'Spoken replies on.' : 'Spoken replies muted.');
}

function getRecognitionCtor() {
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

function toggleVoiceListening() {
  if (isListening) {
    stopVoiceListening();
    return;
  }
  if (!selectedChatAgentId) return;
  const Recognition = getRecognitionCtor();
  if (!Recognition) {
    updateVoiceControls('Voice input is not available in this browser. Try Chrome if Safari blocks it.');
    return;
  }
  speechRecognition = new Recognition();
  speechRecognition.lang = 'en-US';
  speechRecognition.continuous = false;
  speechRecognition.interimResults = true;
  speechRecognition.maxAlternatives = 1;
  isListening = true;
  updateVoiceControls('Listening...');

  speechRecognition.onresult = event => {
    let finalText = '';
    let interimText = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript.trim();
      if (event.results[i].isFinal) finalText += transcript;
      else interimText += transcript;
    }
    const input = document.getElementById('chat-input');
    input.value = finalText || interimText;
    if (finalText) {
      updateVoiceControls('Heard: ' + finalText);
      sendAgentChat({spoken:true});
    }
  };
  speechRecognition.onerror = event => {
    isListening = false;
    updateVoiceControls(`Voice input stopped: ${event.error || 'unknown error'}`);
  };
  speechRecognition.onend = () => {
    isListening = false;
    updateVoiceControls('');
  };
  speechRecognition.start();
}

function stopVoiceListening() {
  if (speechRecognition && isListening) speechRecognition.stop();
  isListening = false;
  updateVoiceControls('');
}

function updateVoiceControls(statusText) {
  const mic = document.getElementById('voice-mic');
  const speaker = document.getElementById('voice-speaker');
  const status = document.getElementById('voice-status');
  if (mic) mic.classList.toggle('listening', isListening);
  if (speaker) speaker.classList.toggle('active', voiceReplyEnabled);
  if (status) {
    const voiceSupport = getRecognitionCtor() ? 'Press mic to speak.' : 'Voice input may require Chrome.';
    status.textContent = statusText || `${voiceReplyEnabled ? 'Spoken replies on' : 'Spoken replies muted'} · ${voiceSupport}`;
  }
}

async function speakAgentReply(a, text) {
  if (CONFIG.PREMIUM_VOICE_ENABLED) {
    const premiumPlayed = await speakPremiumAgentReply(a, text);
    if (premiumPlayed) return;
  }
  if (!('speechSynthesis' in window)) {
    updateVoiceControls('Spoken replies are not available in this browser.');
    return;
  }
  const cleanText = String(text || '')
    .replace(/https?:\/\/\S+/g, 'link')
    .replace(/\s+/g, ' ')
    .trim();
  if (!cleanText) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.lang = 'en-US';
  utterance.rate = 0.96;
  utterance.pitch = voicePitchForAgent(a);
  const voice = chooseVoiceForAgent(a);
  if (voice) utterance.voice = voice;
  window.speechSynthesis.speak(utterance);
}

async function speakPremiumAgentReply(a, text) {
  const cleanText = String(text || '').replace(/\s+/g, ' ').trim();
  if (!cleanText) return false;
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 3500);
  try {
    updateVoiceControls(`Requesting ${a.name}'s premium voice...`);
    const res = await fetch(CONFIG.PREMIUM_VOICE_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({agent_id:findAgentIdByName(a.name), agent_name:a.name, text:cleanText}),
      signal:controller.signal,
    });
    clearTimeout(timeout);
    if (!res.ok) {
      const detail = await res.text().catch(() => '');
      updateVoiceControls(detail ? `Premium voice unavailable: ${detail.slice(0, 90)}` : 'Premium voice unavailable; using browser voice.');
      return false;
    }
    const blob = await res.blob();
    if (!blob || !blob.size) return false;
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onended = () => URL.revokeObjectURL(url);
    audio.onerror = () => {
      URL.revokeObjectURL(url);
      updateVoiceControls('Premium audio playback failed; using browser voice next time.');
    };
    await audio.play();
    updateVoiceControls(`${a.name} is speaking with premium voice.`);
    return true;
  } catch(e) {
    clearTimeout(timeout);
    updateVoiceControls('Premium voice proxy not running; using browser voice.');
    return false;
  }
}

function findAgentIdByName(name) {
  const match = Object.entries(AGENT_META).find(([,meta]) => meta.name === name);
  return match ? match[0] : '';
}

function chooseVoiceForAgent(a) {
  const voices = window.speechSynthesis.getVoices ? window.speechSynthesis.getVoices() : [];
  if (!voices.length) return null;
  const preferredNames = {
    Alex:['Samantha','Ava','Zoe','Allison','Susan'],
    Sophia:['Samantha','Ava','Allison'],
    Diana:['Ava','Samantha','Susan'],
    Rachel:['Allison','Samantha','Ava'],
    Victoria:['Samantha','Ava','Allison'],
    Olivia:['Allison','Samantha','Ava'],
    Priya:['Ava','Samantha','Allison'],
    Catherine:['Samantha','Ava','Susan'],
    Elena:['Ava','Samantha','Allison'],
    Amara:['Ava','Samantha','Allison'],
    Casey:['Samantha','Ava','Alex'],
  };
  const names = preferredNames[a.name] || ['Alex','Daniel','Fred','Tom','Samantha'];
  return names.map(name => voices.find(v => v.name.includes(name))).find(Boolean)
    || voices.find(v => v.lang && v.lang.startsWith('en'))
    || voices[0];
}

function voicePitchForAgent(a) {
  const higher = ['Alex','Sophia','Diana','Rachel','Victoria','Olivia','Priya','Catherine','Elena','Amara','Casey'];
  return higher.includes(a.name) ? 1.08 : 0.92;
}

function generateAgentReply(a, text) {
  const lower = text.toLowerCase();
  const lastUserMessage = getPreviousUserMessage(selectedChatAgentId);
  const task = a.task || 'No active task';
  const thread = a.thread || 'Unassigned thread';
  const progress = Number.isFinite(Number(a.progress)) ? `${a.progress}%` : 'not reported';
  const directAnswer = directQuestionReply(lower, lastUserMessage, a, task);
  if (directAnswer) return directAnswer;

  const approval = "I can draft or recommend it here, but I will keep it approval-gated. Nothing gets sent, posted, priced, or changed in CRM until Michael approves.";
  const closingDate = extractDashboardClosingDate(text);

  if (/(execute|do it|run it|take action|start that|make it happen)/.test(lower)) {
    return [
      "Yes. I can move this forward, but I will keep it approval-gated.",
      `From my ${a.title} lane, the next concrete step is: turn "${task}" into one approve/edit/skip item with the reason, risk, and expected payoff.`,
      "I will not claim I sent, posted, called, changed CRM, or priced anything from this chat unless the backend confirms that action."
    ].join("\n\n");
  }

  if (/(send|email|text|dm|call|post|publish|invite|calendar|crm|change status|update command|approve|approval)/.test(lower)) {
    return [
      "I can prepare that, but I need your approval before anything leaves the system.",
      "Best safe next move: I draft the message/action, label the intended recipient/channel, add why it matters, and give you approve/edit/skip.",
      approval
    ].join("\n\n");
  }

  if (/(price|pricing|value|valuation|cma|net proceeds|list price|seller report)/.test(lower)) {
    return [
      "For pricing or value, I should not guess.",
      "I need subject facts, GSMLS sold/active/pending comps, condition/context, RPR support when useful, and a short reason each comp counts or does not count.",
      approval
    ].join("\n\n");
  }

  if (/(closing|closings|close date|settlement|spruce|norman|hynson|transaction)/.test(lower)) {
    const date = closingDate || getDashboardClosingDateFromHistory() || 'May 18, 2026';
    return [
      `Direct answer: the next two known closings I should track are 13 Spruce Terrace and 2 Norman Lane, both tied to ${date}.`,
      "Diana/Catherine should verify that against the transaction files before any client-facing update.",
      "My next useful action would be to produce a closing-readiness checklist for both files: title, mortgage, walkthrough, settlement time, and missing signatures."
    ].join("\n\n");
  }

  if (/(working|doing|task|status|focus)/.test(lower)) {
    return [
      `Direct answer: I am working on ${task}.`,
      `Thread: ${thread}. Progress: ${progress}.`,
      "The useful output should be one decision-ready item for you, not a generic status update."
    ].join("\n\n");
  }

  if (/(block|blocked|stuck|need|missing)/.test(lower)) {
    return roleBlockerReply(a, approval);
  }

  if (/(top 3|three things|3 things|next|recommend|should i|priority|roi|appointments|listing appointment)/.test(lower)) {
    return roleNextStepReply(a);
  }

  if (/(draft|script|video|voice|client update|intro|explain)/.test(lower)) {
    return `Draft for approval:\n\n"Hi, this is ${a.name} from Michael Rossi's digital support team. I am helping Michael organize the next step on your file so his team can move quickly and accurately. Michael will personally approve any recommendations before anything final is sent."\n\nI would tailor this to the client, property, and stage before it leaves the system.`;
  }

  if (/(source|proof|verify|evidence|gsmls|rpr|narrpr|zillow|realtor|homes)/.test(lower)) {
    return `I would treat GSMLS and RPR/NARRPR as the primary evidence path, then use Zillow, Realtor.com, Homes.com, or public/off-market references only as support when the primary sources are incomplete. I will label every fact by source and confidence before anything becomes client-facing.`;
  }

  return [
    `Direct answer: yes, I can help with that from my ${a.title} lane.`,
    `What I understand: you want a useful response about "${text}", not a repeat of my dashboard task.`,
    `My best first move is to connect it to my current work (${task}) and give you either an answer, a draft, a checklist, or a handoff. For this, I would start with a short checklist and one recommended next action.`,
    "Recommended next action: tell me the specific outcome you want from this request, and I will produce the first approval-ready version."
  ].join("\n\n");
}

function getPreviousUserMessage(agentId) {
  const history = chatHistories[agentId] || [];
  const userMessages = history.filter(msg => msg.who === 'user').map(msg => msg.text);
  return userMessages.length >= 2 ? userMessages[userMessages.length - 2] : '';
}

function directQuestionReply(lower, lastUserMessage, a, task) {
  if (/(nope|still|answers|answer).*(dont|don't|do not|doesn'?t|not).*(make sense|line up|match|right)|glitchy|not making sense/.test(lower)) {
    return [
      "You are right. The issue is that this browser chat is still in local fallback when the live runtime is offline, so it answers from templates instead of truly reasoning through your newest message.",
      "What I am changing about my behavior: I will answer your exact message first, say what I know, say what I do not know, and give one concrete next action. I should not repeat my last status unless you asked for status.",
      `For this agent right now: ${a.name} is assigned to "${task}". A sensible reply should connect your question to that work or tell you plainly that it needs another agent/backend tool.`
    ].join("\n\n");
  }
  if (/(are you live|runtime|backend|connected|offline|why.*fallback|model key|api key)/.test(lower)) {
    return [
      `Direct answer: the dashboard is loaded, but the real agent runtime is only live when your backend is reachable at ${getAgentRuntimeBaseUrl()} and a model key is configured.`,
      "If the runtime is offline, I can still answer in local direct-response mode, but I will not be as intelligent or context-aware as the model-backed agent.",
      "Best next action: host the backend at a real URL and add an OpenAI or OpenRouter key so Alex can reason instead of using fallback logic."
    ].join("\n\n");
  }
  if (lower.includes('answer only this question') && lower.includes('what did i just ask you to improve')) {
    return 'You asked me to improve Alex so she stops drifting and answers your actual Telegram texts more directly.';
  }
  if (lower.includes('what did i just ask') || lower.includes('what was my last question') || lower.includes('what did i ask you')) {
    if (lastUserMessage) return `You just asked: "${lastUserMessage}"`;
    return 'I do not have a previous user message in this dashboard chat yet.';
  }
  if (lower.includes('did that answer') || lower.includes('that did not answer') || lower.includes('you drifted')) {
    return 'You are right. I drifted. The direct answer should come first, and I should only add role/context guidance after answering the exact question.';
  }
  if (lower.includes('what did you change') && (lower.includes('alex') || lower.includes('telegram') || lower.includes('grounding'))) {
    return 'I tightened Alex so she must answer your exact Telegram message first, stay grounded to available evidence, keep proactive ideas secondary, and use a shorter Telegram response pattern.';
  }
  return '';
}

function extractDashboardClosingDate(text) {
  const lower = String(text || '').toLowerCase();
  if (/(may\s*18|may eighteenth|5\/18|05\/18|tomorrow)/.test(lower)) return 'May 18, 2026';
  if (/(may\s*27|may twenty seventh|may twenty-seventh|5\/27|05\/27)/.test(lower)) return 'May 27, 2026';
  const match = lower.match(/\b(january|february|march|april|may|june|july|august|september|october|november|december)\s+(\d{1,2})(?:,\s*(\d{4}))?/i);
  if (!match) return '';
  const month = match[1][0].toUpperCase() + match[1].slice(1);
  return `${month} ${Number(match[2])}, ${match[3] || '2026'}`;
}

function getDashboardClosingDateFromHistory() {
  const history = chatHistories[selectedChatAgentId] || [];
  for (let i = history.length - 1; i >= 0; i--) {
    const date = extractDashboardClosingDate(history[i].text || '');
    if (date) return date;
  }
  return '';
}

function roleBlockerReply(a, approval) {
  const role = `${a.name} ${a.title}`.toLowerCase();
  if (role.includes('sophia') || role.includes('listing')) {
    return `My likely blockers are missing source-backed property facts, insufficient verified comps, unclear seller motivation, or an unapproved pricing narrative. ${approval}`;
  }
  if (role.includes('daniel') || role.includes('market research')) {
    return `My blockers are evidence quality: I need reliable sold/active/pending data, property condition context, and clear reasons each comp is included or excluded.`;
  }
  if (role.includes('thomas') || role.includes('compliance')) {
    return `My blockers are compliance checks: DNC/TCPA posture, disclosure requirements, source attribution, and making sure no outreach or valuation claim creates risk.`;
  }
  if (role.includes('rachel') || role.includes('client experience')) {
    return `My blockers are relationship context and tone: who already knows Michael, what they last needed, and whether the next touch should be warm, service-based, or appointment-focused.`;
  }
  if (role.includes('alex') || role.includes('chief')) {
    return `My blocker is usually decision clarity. I need the team to present clean approve/edit/skip options with evidence, expected ROI, and risk notes so your time is protected.`;
  }
  return `My blockers are usually missing context, missing source evidence, or an action that needs your approval before it can move forward. ${approval}`;
}

function roleNextStepReply(a) {
  const role = `${a.name} ${a.title}`.toLowerCase();
  if (role.includes('sales') || role.includes('lead') || role.includes('appointment')) {
    return `Recommended next step: prioritize the hottest seller-intent records, convert each into one approved outreach draft, and track whether it moves toward a listing appointment. The weekly target stays three qualified listing appointments minimum.`;
  }
  if (role.includes('marketing') || role.includes('content') || role.includes('social') || role.includes('email')) {
    return `Recommended next step: turn verified proof points into appointment-generating assets: seller pain posts, market shift updates, expired/FSBO education, and past-client referral prompts. I will draft, but publishing stays approval-gated.`;
  }
  if (role.includes('listing') || role.includes('market research')) {
    return `Recommended next step: produce the strongest seller-prep packet for the next 1-2 opportunities: property facts, seller motivation, likely value range only after evidence, competition, absorption, and appointment angle.`;
  }
  if (role.includes('compliance')) {
    return `Recommended next step: review any proposed seller outreach for DNC/TCPA, fair housing, source attribution, and valuation language before Michael sees the approve/edit/skip version.`;
  }
  return `Recommended next step: convert my current task into one decision-ready item for Michael with evidence, expected ROI, and the smallest possible approval request.`;
}

function buildActivity() {
  document.getElementById('feed-label').textContent =
    'Activity Log — ' + new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const list = document.getElementById('feed-list');
  list.innerHTML = '';
  [...activityLog].reverse().forEach((item, i) => {
    const a = agentData[item.agent]; if (!a) return;
    const tc = TYPE_COLORS[item.type] || '#888';
    list.innerHTML += `<div class="feed-item" style="border-left-color:${tc};animation:fadeUp .2s ease ${i*0.02}s both">
      <div style="flex-shrink:0;padding-top:1px">${portraitHTML(a, 30)}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
          <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,.85);font-family:'IBM Plex Mono',monospace">${a.name}</span>
          <span style="font-size:8px;padding:1px 6px;border-radius:3px;background:${tc}20;color:${tc};font-family:'IBM Plex Mono',monospace">${item.type.toUpperCase()}</span>
          <span style="margin-left:auto;font-size:9px;color:rgba(255,255,255,.3);font-family:'IBM Plex Mono',monospace;flex-shrink:0">${item.time}</span>
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,.55);line-height:1.5">${item.action}</div>
      </div>
    </div>`;
  });
}

function buildBoard() {
  const cols = document.getElementById('board-cols');
  cols.innerHTML = '';
  const colDefs = [
    {label:'🟢 In Progress',color:'#34d399',filter:a=>a.status==='active'&&a.progress>0&&a.progress<80},
    {label:'✅ Near Complete',color:'#D4AF37',filter:a=>a.status==='active'&&a.progress>=80},
    {label:'☕ Break Room',color:'rgba(255,255,255,.2)',filter:a=>a.status==='idle'||a.location==='break'},
  ];
  colDefs.forEach(col => {
    const agents = Object.entries(agentData).filter(([,a])=>col.filter(a));
    let html = `<div><div class="board-col-hdr">${col.label}<span class="board-count">${agents.length}</span></div>`;
    agents.forEach(([id,a]) => {
      html += `<div class="task-card" style="border-top-color:${a.color}" onclick="handleAgentTap('${id}')">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:${a.status==='active'?'6px':'0'}">
          <span style="display:flex">${portraitHTML(a, 26)}</span>
          <span style="font-size:11px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:rgba(255,255,255,.85)">${a.name}</span>
          ${a.status==='active'?`<span style="margin-left:auto;font-size:9px;color:${a.color};font-family:'IBM Plex Mono',monospace">${a.progress}%</span>`:''}
        </div>
        <div style="font-size:10px;color:rgba(255,255,255,.45);line-height:1.4;margin-bottom:${a.status==='active'?'5px':'0'}">${a.task}</div>
        ${a.status==='active'?`<div class="prog-bg"><div class="prog-fg" style="width:${a.progress}%;background:${a.color}"></div></div>`:''}
        <div style="margin-top:5px;font-size:9px;color:rgba(255,255,255,.2)">${a.thread}</div>
      </div>`;
    });
    html += `</div>`;
    cols.innerHTML += html;
  });
}

// ═══════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  currentTab = tab;
}

// ═══════════════════════════════════════════
// REFRESH SYSTEM
// ═══════════════════════════════════════════
async function doRefresh(animate = true) {
  await fetchData();
  moveAgents(animate);
  buildActivity();
  buildBoard();
  const now = new Date();
  document.getElementById('refresh-text').textContent =
    `Updated ${now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
}

function manualRefresh() {
  clearInterval(refreshTimer);
  doRefresh(true).then(() => startTimer());
}

function startTimer() {
  refreshCountdown = CONFIG.REFRESH_INTERVAL / 1000;
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    refreshCountdown--;
    const pct = (refreshCountdown / (CONFIG.REFRESH_INTERVAL / 1000)) * 100;
    document.getElementById('refresh-fill').style.width = pct + '%';
    document.getElementById('refresh-text').textContent = `Refreshing in ${refreshCountdown}s`;
    if (refreshCountdown <= 0) {
      clearInterval(refreshTimer);
      doRefresh(true).then(() => startTimer());
    }
  }, 1000);
}

function startMotion() {
  clearInterval(motionTimer);
  motionTimer = setInterval(() => {
    if (currentTab === 'office') moveAgents(true);
  }, 3500);
}

// ═══════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + ' · ' +
    now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
updateClock();
setInterval(updateClock, 1000);

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
  document.getElementById('loading-status').textContent = 'Loading agent data...';
  loadChatHistories();
  loadVoicePreference();
  initChatSync();
  if ('speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = () => updateVoiceControls('');
  }
  await fetchData();
  document.getElementById('loading-status').textContent = 'Building your office...';
  buildFloor();
  createAgentAvatars();
  document.getElementById('loading-status').textContent = 'Placing your team...';
  // Place agents instantly on first load (no animation)
  moveAgents(false);
  buildActivity();
  buildBoard();
  switchTab('office');
  document.getElementById('loading').classList.add('hidden');
  setTimeout(() => document.getElementById('loading').remove(), 500);
  startTimer();
  startMotion();
}

init();
</script>
